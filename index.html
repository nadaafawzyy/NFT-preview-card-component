<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <!-- <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png"> -->
  <link rel="stylesheet" href="style.css">
  <!-- fonts -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap');
  </style>
  <!-- icons -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <title>Frontend Mentor | NFT preview card component</title>

</head>
<body>
<main>
  <div class="contant">
  <div class="image-container">
  <img class="main-img" src="images/image-equilibrium.jpg" alt="equilibrium">
  <div class="overlay">
  <img class="eye-icon" src="images/icon-view.svg" alt="view icon">
</div></div>
  <h1>Equilibrium #3429</h1>
  <p class="paragraph">Our Equilibrium collection promotes balance and calm.</p>
</div>
<div class="icons">
  <div class="eth-icon"><img src="images/icon-ethereum.svg" alt="ethereum icon">
  <p class="code">0.041 ETH</p></div>
  <div class="clck-icon"><img src="images/icon-clock.svg" alt="clock icon">
  <p class="time">3 days left</p></div>
  </div>
  <hr>

  <div class="creator">
  <img src="images/image-avatar.png" alt="avatar">
  <p>Creation of <span>Jules Wyvern</span> </p>
</div>

</main>

  <footer>
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://nadaafawzyy.github.io/social-links-profile-main/">NADA fAWZY</a>.
  </footer>
</body>
</html>
